<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Teleprompter · Screen Recorder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}

#setup{display:flex;flex-direction:column;gap:10px;padding:16px;height:100%}
textarea{
  flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;color:#fff;font-size:14px;line-height:1.6;padding:10px;
  resize:none;font-family:-apple-system,sans-serif;outline:none}
textarea:focus{border-color:rgba(255,59,48,0.5)}
textarea::placeholder{color:rgba(255,255,255,0.3)}

.row{display:flex;align-items:center;gap:12px}
.lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;
  color:rgba(255,255,255,0.4);min-width:70px}
input[type=range]{flex:1;accent-color:#ff3b30}
.val{font-size:13px;color:rgba(255,255,255,0.6);min-width:38px;text-align:right}

#hint-idle{font-size:11px;color:rgba(255,255,255,0.25);text-align:center;padding-bottom:2px}

#scroll-view{
  display:none;position:fixed;inset:0;background:#000;overflow:hidden;cursor:pointer}
#scroll-view.on{display:block}

#txt{
  position:absolute;width:100%;text-align:center;
  color:#fff;font-weight:500;line-height:1.7;padding:0 60px;
  text-shadow:0 2px 12px rgba(0,0,0,0.9);
  white-space:pre-wrap}

#hint-scroll{
  position:fixed;bottom:12px;left:0;right:0;text-align:center;
  font-size:11px;color:rgba(255,255,255,0.3);pointer-events:none}
</style>
</head>
<body>
<div id="setup">
  <textarea id="ta" placeholder="Paste your script here…"></textarea>
  <div class="row">
    <span class="lbl">Text Size</span>
    <input type="range" id="sl-size" min="20" max="72" value="36">
    <span class="val" id="v-size">36px</span>
  </div>
  <div class="row">
    <span class="lbl">Speed</span>
    <input type="range" id="sl-speed" min="10" max="200" value="50">
    <span class="val" id="v-speed">50</span>
  </div>
  <div id="hint-idle">Script auto-saved · Scrolling starts when you hit Record</div>
</div>

<div id="scroll-view">
  <div id="txt"></div>
  <div id="hint-scroll">Click or press Esc to stop</div>
</div>

<script src="teleprompter.js"></script>
</body>
</html>
